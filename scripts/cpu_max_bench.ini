# cpu_max_bench.py configuration file
#
# Each section defines one benchmark run.
# Runs with the same (cgroup_depth, quota, load_factor) are placed in the
# same report group and share a single CPU-utilisation graph.
#
# Keys and their defaults:
#   cgroup_depth  = 32
#   quota         = max          # "max" or a float (percent of nproc)
#   load_factor   = 100          # workers = nproc * load_factor / 100
#   duration      = 60           # seconds
#   scheduler     = eevdf        # eevdf | scx_lavd
#   scx_path      = /usr/bin/scx_lavd
#   scx_args      = --performance --enable-cpu-bw
#
# Usage:
#   sudo python3 scripts/cpu_max_bench.py -o results/ scripts/cpu_max_bench.ini

# ==================================================================
# Group 0 -- Root cgroup: workload runs directly in the system root
#   cgroup with no per-run hierarchy at all (cgroup_depth=0).
#   cpu.stat at the root reports SYSTEM-WIDE usage, so the load
#   stress-ng generates dominates the measurement.  Establishes a
#   "no-cgroup-overhead" baseline for comparison.
#   group key: cgroup_depth=0, quota=max, load_factor=100
#   Compares: eevdf, scx_lavd w/ cpu-bw, scx_lavd w/o cpu-bw
# ==================================================================

[root_eevdf]
cgroup_depth = 0
quota        = max
load_factor  = 100
duration     = 60
scheduler    = eevdf

[root_lavd]
cgroup_depth = 0
quota        = max
load_factor  = 100
duration     = 60
scheduler    = scx_lavd
scx_path     = /usr/bin/scx_lavd
scx_args     = --performance

[root_lavd_bw]
cgroup_depth = 0
quota        = max
load_factor  = 100
duration     = 60
scheduler    = scx_lavd
scx_path     = /usr/bin/scx_lavd
scx_args     = --performance --enable-cpu-bw

