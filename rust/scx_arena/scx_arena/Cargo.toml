[package]
name = "scx_arena"
version = "1.1.0"
edition = "2021"
description = "Crate for setting up the BPF arena library for sched-ext schedulers."
license = "GPL-2.0-only"

[dependencies]
anyhow = "1"
libbpf-rs = "=0.26.1"
libbpf-sys = "=1.7.0"
simplelog = "0.12"
scx_utils = { path = "../../scx_utils", version = "1.1.0" }

[build-dependencies]
scx_cargo = { path = "../../scx_cargo", version = "1.1.0" }
