[package]
name = "scxcash"
version = "1.1.0"
edition = "2021"
authors = ["Kumar Kartikeya Dwivedi <memxor@gmail.com>"]
license = "GPL-2.0-only"
repository = "https://github.com/sched-ext/scx"
description = "Cache Usage Analyzer for sched_ext Schedulers"
build = "build.rs"

[package.metadata.veristat]
disable = true

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
clap_complete = "4"
log = "0.4"
libc = "0.2"
libbpf-rs = "=0.26.2"
scx_utils = { path = "../../rust/scx_utils", version = "1.1.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
simplelog = "0.12"
ctrlc = "3"
num_cpus = "1"

[build-dependencies]
scx_cargo = { path = "../../rust/scx_cargo", version = "1.1.0" }
