[package]
name = "xtask"
version = "1.1.1"
edition = "2021"

publish = false

[package.metadata.scx]
ci.use_clippy = true

[dependencies]
anyhow = "1"
cargo_metadata = "0.23"
clap = { version = "4", features = ["derive"] }
log = "0.4"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
simplelog = "0.12"
once_cell = "1"
toml = "1"
