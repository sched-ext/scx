[package]
name = "scxtop"
version = "1.1.0"
edition = "2021"
authors = ["Daniel Hodges <hodges.daniel.scott@gmail.com>", "Yaakov Stein <ymstein14@gmail.com>"]
license = "GPL-2.0-only"
repository = "https://github.com/sched-ext/scx"
description = "sched_ext scheduler tool for observability"

[package.metadata.scx]
ci.use_clippy = true

[dependencies]
anyhow = "1"
clap = { version = "4", features = [
    "derive",
    "cargo",
    "wrap_help",
    "unicode",
    "string",
    "unstable-styles",
] }
clap_complete = "4"
crossterm = { version = "0.29", features = ["serde", "event-stream"] }
futures = "0.3"
glob = "0.3"
libbpf-rs = "=0.26.1"
libc = "0.2"
log = "0.4"
num-format = { version = "0.4", features = ["with-serde", "with-system-locale"] }
perfetto_protos = "0.51"
plain = "0.2"
procfs = "0.18"
protobuf = "3"
rand = "0.10"
ratatui = { version = "0.30", features = ["serde", "macros"] }
regex = "1"
scx_stats = { path = "../../rust/scx_stats", version = "1.1.0" }
scx_utils = { path = "../../rust/scx_utils", version = "1.1.0" }
simplelog = "0.12"
serde_json = "1"
serde = { version = "1", features = ["derive"] }
signal-hook = "0.4"
sysinfo = "0.35"
tokio-util = "0.7"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
xdg = "2"
log-panics = { version = "2", features = ["with-backtrace"]}
hashbrown = "0.16"
smartstring = { version = "1", features = ["serde"] }
nix = { version = "0.31", features = ["time", "user"] }
blazesym = "0.2"
rayon = "1"

[dev-dependencies]
criterion = "0.8"
tempfile = "3"

[[bench]]
name = "search_benchmark"
harness = false

[build-dependencies]
scx_stats = { path = "../../rust/scx_stats", version = "1.1.0" }
scx_cargo = { path = "../../rust/scx_cargo", version = "1.1.0" }
