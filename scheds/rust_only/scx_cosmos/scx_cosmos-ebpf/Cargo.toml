[package]
name = "scx_cosmos-ebpf"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "scx_cosmos"
path = "src/main.rs"

[features]
# Enable kfuncs that only exist on kernel >= 6.16:
# - scx_bpf_select_cpu_and() for cpumask-filtered idle CPU selection
# - scx_bpf_task_set_dsq_vtime() / scx_bpf_task_set_slice() for safe field writes
kernel_6_16 = ["scx-ebpf/kernel_6_16"]

[dependencies]
scx-ebpf = { path = "../../../../rust/scx_ebpf" }

[build-dependencies]
scx-vmlinux = { path = "../../../../rust/scx_vmlinux" }
