[workspace]
resolver = "2"
members = [".", "scx_cosmos-ebpf"]

[package]
name = "scx_cosmos"
version = "0.1.0"
edition = "2021"
license = "GPL-2.0-only"

[features]
# Enable scx_bpf_select_cpu_and() kfunc in the eBPF program.
# Requires kernel >= 6.16 where this kfunc exists in vmlinux BTF.
# Without this feature, pick_idle_cpu() skips primary cpumask filtering
# and falls back to select_cpu_dfl().
kernel_6_16 = []

[dependencies]
aya = { path = "../../../../aya/aya" }
anyhow = "1.0"
clap = { version = "4", features = ["derive"] }
ctrlc = "3.4"
libc = "0.2"
log = "0.4"
env_logger = "0.11"

[build-dependencies]
aya-build = "0.1"
