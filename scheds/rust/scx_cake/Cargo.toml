[package]
name = "scx_cake"
version = "1.1.0"
authors = ["RitzDaCat"]
edition = "2021"
description = "A sched_ext scheduler applying CAKE bufferbloat concepts to CPU scheduling"
license = "GPL-2.0-only"

[dependencies]
anyhow.workspace = true
clap = { version = "4", features = ["derive"] }
ctrlc = "3"
libbpf-rs.workspace = true
libc.workspace = true
log.workspace = true
env_logger = "0.11"
ratatui = { version = "0.30" }
crossterm = "0.29"
arboard = "3"

scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0" }
scx_arena = { path = "../../../rust/scx_arena/scx_arena", version = "1.1.0" }
sysinfo = "0.38"
core_affinity = "0.8"
quanta = "0.12"
crossbeam-utils = "0.8"
tachyonfx = "0.25"
nix = { version = "0.31", features = ["signal", "poll"] }

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }

[[bin]]
name = "scx_cake"
path = "src/main.rs"
