[package]
name = "scx_cake"
version = "1.2.0"
authors = ["RitzDaCat"]
edition = "2021"
description = "A sched_ext scheduler applying CAKE bufferbloat concepts to CPU scheduling"
license = "GPL-2.0-only"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
ctrlc = { version = "3", features = ["termination"] }
libbpf-rs = "=0.26.2"
libc = "0.2"
log = "0.4"
simplelog = "0.12"

scx_utils = { path = "../../../rust/scx_utils", version = "1.1.1" }

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.1" }

[[bin]]
name = "scx_cake"
path = "src/main.rs"
