[package]
name = "scx_cake"
version = "1.1.2"
authors = ["RitzDaCat"]
edition = "2021"
description = "A sched_ext scheduler applying CAKE bufferbloat concepts to CPU scheduling"
license = "GPL-2.0-only"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
ctrlc = { version = "3", features = ["termination"] }
libbpf-rs = "=0.26.2"
libc = "0.2"
log = "0.4"
env_logger = "0.11"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
strum = { version = "0.27", features = ["derive"] }
ratatui = { version = "0.30" }
crossterm = "0.29"
arboard = "3"

scx_utils = { path = "../../../rust/scx_utils", version = "1.1.1" }
scx_arena = { path = "../../../rust/scx_arena/scx_arena", version = "1.1.1" }
sysinfo = "0.39"
core_affinity = "0.8"
quanta = "0.12"
crossbeam-utils = "0.8"
tachyonfx = "0.25"
nix = { version = "0.31", features = ["signal", "poll"] }

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.1" }

[[bin]]
name = "scx_cake"
path = "src/main.rs"
