[package]
name = "scx_p2dq"
version = "1.1.0"
authors = ["Daniel Hodges <hodges.daniel.scott@gmail.com>"]
edition = "2021"
description = "scx_p2dq A simple pick two load balancing scheduler in BPF"
license = "GPL-2.0-only"

[package.metadata.scx]
ci.use_clippy = true

[package.metadata.scx.ci.kernel]
blocklist = [
  "stable/6_12" # https://github.com/sched-ext/scx/issues/3047
]

[dependencies]
scx_arena = { path = "../../../rust/scx_arena/scx_arena", version = "1.1.0" }
anyhow = "1"
chrono = "0.4"
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
clap_main = "0.2"
crossbeam = "0.8"
ctrlc = { version = "3", features = ["termination"] }
lazy_static = "1"
libbpf-rs = "=0.26.2"
libc = "0.2"
ordered-float = "5"
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.0" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.0" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0" }
serde = { version = "1", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "parking_lot", "tracing-log"] }
sorted-vec = "0.8"
static_assertions = "1"

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }

[features]
enable_backtrace = []
