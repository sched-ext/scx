[package]
name = "scx_chaos"
version = "1.1.0"
edition = "2021"
authors = ["Jake Hillion <jake@hillion.co.uk>"]
description = "scx_chaos A general purpose sched_ext scheduler designed to amplify race conditions"
license = "GPL-2.0-only"

[package.metadata.scx]
ci.use_clippy = true

[dependencies]
scx_arena = { path = "../../../rust/scx_arena/scx_arena", version = "1.1.0" }
scx_userspace_arena = { path = "../../../rust/scx_userspace_arena", version = "1.1.0" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0" }
scx_p2dq = { path = "../../../scheds/rust/scx_p2dq", version = "1.1.0" }
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.0" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.0" }

anyhow.workspace = true
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
crossbeam.workspace = true
ctrlc = { version = "3", features = ["termination"] }
libbpf-rs.workspace = true
libc.workspace = true
log.workspace = true
nix = { version = "0.31", features = ["process"] }
serde.workspace = true
simplelog.workspace = true

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }
