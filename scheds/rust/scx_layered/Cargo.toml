[package]
name = "scx_layered"
version = "1.1.0"
authors = ["Tejun Heo <htejun@meta.com>", "Meta"]
edition = "2021"
description = "A highly configurable multi-layer BPF / user space hybrid scheduler used within sched_ext, which is a Linux kernel feature which enables implementing kernel thread schedulers in BPF and dynamically loading them. https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"

[dependencies]
anyhow.workspace = true
bitvec = "1"
chrono = "0.4"
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
clap_main = "0.2"
crossbeam.workspace = true
ctrlc = { version = "3", features = ["termination"] }
fastrand = "2"
fb_procfs = "0.9"
inotify = "0.11"
lazy_static.workspace = true
libbpf-rs.workspace = true
libc.workspace = true
regex.workspace = true
scx_bpf_compat = { path = "../../../rust/scx_bpf_compat", version = "1.1.0" }
scx_raw_pmu = { path = "../../../rust/scx_raw_pmu", version = "1.1.0" }
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.0" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.0" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0" }
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "parking_lot", "tracing-log"] }
once_cell = "1"
plain.workspace = true
walkdir.workspace = true
nvml-wrapper = "0.12"
nix = { version = "0.31", features = ["sched"] }
sysinfo = "0.38"

[dev-dependencies]
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0", features = ["testutils"] }

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }

[features]
enable_backtrace = []

[package.metadata.appimage]
auto_link = true
