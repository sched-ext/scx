[package]
name = "scx_beerland"
version = "1.0.5"
authors = ["Andrea Righi <arighi@nvidia.com>"]
edition = "2021"
description = "Scheduler designed to prioritize locality and scalability. https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"

[dependencies]
anyhow = "1.0.102"
ctrlc = { version = "3.5", features = ["termination"] }
clap = { version = "4.5.60", features = ["derive", "env", "unicode", "wrap_help"] }
crossbeam = "0.8.4"
libbpf-rs = "=0.26.1"
log = "0.4.29"
scx_stats = { path = "../../../rust/scx_stats", version = "1.0.22" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.0.21" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.0.26", features = ["autopower"] }
serde = { version = "1.0.228", features = ["derive"] }
simplelog = "0.12"

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.0.27" }

[features]
enable_backtrace = []
