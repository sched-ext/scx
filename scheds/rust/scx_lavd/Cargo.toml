[package]
name = "scx_lavd"
version = "1.1.0"
authors = ["Changwoo Min <changwoo@igalia.com>", "Igalia"]
edition = "2021"
description = "A Latency-criticality Aware Virtual Deadline (LAVD) scheduler based on sched_ext, which is a Linux kernel feature which enables implementing kernel thread schedulers in BPF and dynamically loading them. https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"

[package.metadata.scx.ci.kernel]
blocklist = [
  "stable/6_12" # https://github.com/sched-ext/scx/issues/3046
]

[dependencies]
scx_arena = { path = "../../../rust/scx_arena/scx_arena", version = "1.1.0" }
anyhow.workspace = true
bitvec = { version = "1", features = ["serde"] }
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
clap_main = "0.2"
clap-num = { version = "1" }
crossbeam.workspace = true
ctrlc = { version = "3", features = ["termination"] }
hex = "0.4"
itertools = "0.14"
libbpf-rs.workspace = true
libc.workspace = true
ordered-float.workspace = true
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.0" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.0" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0", features = ["autopower"] }
serde.workspace = true
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "parking_lot", "tracing-log"] }
static_assertions.workspace = true
plain.workspace = true
gpoint = "0.2"
combinations = "0.1"
rlimit = "0.11"
nix = "0.31"

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }

[features]
enable_backtrace = []
