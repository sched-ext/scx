[package]
name = "scx_wd40"
version = "1.1.0"
authors = ["Emil Tsalapatis <etsal@meta.com>", "Dan Schatzberg <dschatzberg@meta.com>", "Meta"]
edition = "2021"
description = "An experimental fork of the scx_rusty scheduler that uses BPF arenas to simplify scheduler development. Found in: https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"

publish = false

[package.metadata.scx]
ci.disable_veristat = true  # requires some changes to vmlinux handling, see https://github.com/sched-ext/scx/pull/2246

[dependencies]
anyhow = "1"
scx_arena = { path = "../../../rust/scx_arena/scx_arena", version = "1.1.0" }
chrono = "0.4"
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
crossbeam = "0.8"
ctrlc = { version = "3", features = ["termination"] }
fb_procfs = "0.9"
libbpf-rs = "=0.26.1"
nix = { features = ["process", "time"], default-features = false, version = "0.31" }
log = "0.4"
ordered-float = "5"
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.0" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.0" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0" }
serde = { version = "1", features = ["derive"] }
simplelog = "0.12"
sorted-vec = "0.8"
static_assertions = "1"

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }

[features]
enable_backtrace = []

[lints.clippy]
non_canonical_partial_ord_impl = "allow"
