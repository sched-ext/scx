[package]
name = "scx_rusty"
version = "1.1.0"
authors = ["Dan Schatzberg <dschatzberg@meta.com>", "Meta"]
edition = "2021"
description = "A multi-domain, BPF / user space hybrid scheduler used within sched_ext, which is a Linux kernel feature which enables implementing kernel thread schedulers in BPF and dynamically loading them. https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"

[dependencies]
anyhow.workspace = true
chrono = "0.4"
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
crossbeam.workspace = true
ctrlc = { version = "3", features = ["termination"] }
fb_procfs = "0.9"
libbpf-rs.workspace = true
libc.workspace = true
log.workspace = true
ordered-float.workspace = true
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.0" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.0" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0" }
serde.workspace = true
simplelog.workspace = true
sorted-vec = "0.8"
static_assertions.workspace = true

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }

[features]
enable_backtrace = []

[lints.clippy]
non_canonical_partial_ord_impl = "allow"
