[package]
name = "scx_cognis"
version = "2.0.7"
authors = ["scx_cognis contributors"]
edition = "2021"
description = "BPF-first sched_ext CPU scheduler with locality-aware desktop and server profiles. https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"
repository = "https://github.com/sched-ext/scx"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
ctrlc = { version = "3", features = ["termination"] }
libbpf-rs = "=0.26.1"
libc = "0.2"
log = "0.4"
plain = "0.2"
procfs = "0.18"
serde = { version = "1", features = ["derive"] }
simplelog = "0.12"
scx_rustland_core = { path = "../../../rust/scx_rustland_core", version = "2.4.11" }
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.0" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.0" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0", features = ["autopower"] }

# TUI
crossterm = "0.27"
ratatui   = "0.26"

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }

[features]
enable_backtrace = []

# Suppress lints that originate in the BPF skeleton generated by libbpf-cargo.
# Per-file #[allow] attributes cannot be committed durably on generated files,
# so we use crate-level suppression via [lints.clippy] instead.
[lints.clippy]
too_many_arguments = "allow"
useless_asref      = "allow"
