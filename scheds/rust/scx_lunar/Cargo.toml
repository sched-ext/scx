[package]
name = "scx_lunar"
version = "1.0.0"
edition = "2021"
description = "Multi-queue latency-focused scheduler with per-CPU/per-LLC dispatch modes"
license = "GPL-2.0-only"

[dependencies]
anyhow = "1"
ctrlc = { version = "3", features = ["termination"] }
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
libbpf-rs = "=0.26.2"
log = "0.4"
scx_utils = { path = "../../../rust/scx_utils" }
simplelog = "0.12"

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo" }

[features]
enable_backtrace = []
