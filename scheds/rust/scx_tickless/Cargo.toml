[package]
name = "scx_tickless"
version = "1.1.1"
authors = ["Andrea Righi <arighi@nvidia.com>", "NVIDIA"]
edition = "2021"
description = "A server-oriented scheduler designed to minimize OS noise and maximize performance isolation. https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"

[dependencies]
affinity = "0.1"
anyhow = "1"
ctrlc = { version = "3", features = ["termination"] }
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
crossbeam = "0.8"
libbpf-rs = "=0.26.2"
log = "0.4"
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.1" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.1" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.1", features = ["autopower"] }
serde = { version = "1", features = ["derive"] }
simplelog = "0.12"

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.1" }

[features]
enable_backtrace = []
