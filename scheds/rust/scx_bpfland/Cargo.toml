[package]
name = "scx_bpfland"
version = "1.1.0"
authors = ["Andrea Righi <andrea.righi@linux.dev>"]
edition = "2021"
description = "A vruntime-based sched_ext scheduler that prioritizes interactive workloads. https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"

[dependencies]
anyhow.workspace = true
ctrlc = { version = "3", features = ["termination"] }
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
crossbeam.workspace = true
libbpf-rs.workspace = true
log.workspace = true
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.0" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.0" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0", features = ["autopower"] }
serde.workspace = true
simplelog.workspace = true

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }

[features]
enable_backtrace = []
