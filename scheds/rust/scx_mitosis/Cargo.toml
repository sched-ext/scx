[package]
name = "scx_mitosis"
version = "1.1.0"
authors = ["Dan Schatzberg <dschatzberg@meta.com>", "Meta"]
edition = "2021"
description = "A dynamic affinity scheduler used within sched_ext, which is a Linux kernel feature which enables implementing kernel thread schedulers in BPF and dynamically loading them. https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"

publish = false

[dependencies]
anyhow.workspace = true
bitvec = "1"
cgroupfs = "0.9"
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
clap_main = "0.2"
ctrlc = { version = "3", features = ["termination"] }
itertools = "0.14"
lazy_static.workspace = true
libbpf-rs.workspace = true
libc.workspace = true
inotify = "0.11"
nix = { version = "0.31", features = ["event"] }
crossbeam.workspace = true
maplit = "1"
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.0" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.0" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0" }
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "parking_lot", "tracing-log"] }

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }

[dev-dependencies]
tempfile.workspace = true
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0", features = ["testutils"] }

[features]
enable_backtrace = []
