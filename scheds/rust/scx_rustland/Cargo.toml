[package]
name = "scx_rustland"
version = "1.1.0"
authors = ["Andrea Righi <andrea.righi@linux.dev>"]
edition = "2021"
description = "A BPF component (dispatcher) that implements the low level sched-ext functionalities and a user-space counterpart (scheduler), written in Rust, that implements the actual scheduling policy. This is used within sched_ext, which is a Linux kernel feature which enables implementing kernel thread schedulers in BPF and dynamically loading them. https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"

[dependencies]
anyhow.workspace = true
plain.workspace = true
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
ctrlc = { version = "3", features = ["termination"] }
libbpf-rs.workspace = true
libc.workspace = true
log.workspace = true
ordered-float.workspace = true
procfs = "0.18"
serde.workspace = true
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.0" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.0" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0" }
scx_rustland_core = { path = "../../../rust/scx_rustland_core", version = "2.4.11" }
simplelog.workspace = true

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }
scx_rustland_core = { path = "../../../rust/scx_rustland_core", version = "2.4.11" }

[features]
enable_backtrace = []
