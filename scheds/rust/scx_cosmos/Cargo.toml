[package]
name = "scx_cosmos"
version = "1.1.0"
authors = ["Andrea Righi <arighi@nvidia.com>"]
edition = "2021"
description = "Lightweight scheduler optimized for preserving task-to-CPU locality. https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"

[dependencies]
anyhow.workspace = true
ctrlc = { version = "3", features = ["termination"] }
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
crossbeam.workspace = true
libbpf-rs.workspace = true
log.workspace = true
nvml-wrapper = "0.12"
nvml-wrapper-sys = "0.9"
perf-event-open-sys = "6"
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.0" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.0" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0", features = ["autopower", "gpu-topology"] }
serde.workspace = true
simplelog.workspace = true

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }

[features]
enable_backtrace = []
gpu-topology = []
