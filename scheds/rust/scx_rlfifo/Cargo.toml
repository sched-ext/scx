[package]
name = "scx_rlfifo"
version = "1.1.0"
authors = ["Andrea Righi <andrea.righi@linux.dev>"]
edition = "2021"
description = "A simple FIFO scheduler in Rust that runs in user-space"
license = "GPL-2.0-only"

[dependencies]
anyhow.workspace = true
plain.workspace = true
procfs = "0.18"
ctrlc = { version = "3", features = ["termination"] }
libbpf-rs.workspace = true
libc.workspace = true
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.0" }
scx_rustland_core = { path = "../../../rust/scx_rustland_core", version = "2.4.11" }

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }
scx_rustland_core = { path = "../../../rust/scx_rustland_core", version = "2.4.11" }

[features]
enable_backtrace = []
