[package]
name = "scx_pandemonium"
version = "5.4.13"
edition = "2021"
description = "A behavioral, adaptive sched_ext scheduler with three-tier classification, L2 affinity, and process learning"
license = "GPL-2.0-only"

[dependencies]
libbpf-rs = { version = "=0.26.1" }
libc.workspace = true
anyhow.workspace = true
clap = { version = "4", features = ["derive"] }
ctrlc = { version = "3", features = ["termination"] }
flate2 = "1"
regex.workspace = true

[dev-dependencies]
libc.workspace = true

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }
