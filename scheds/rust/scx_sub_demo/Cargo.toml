[package]
name = "scx_sub_demo"
version = "0.1.0"
edition = "2021"
license = "GPL-2.0-only"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
ctrlc = { version = "3", features = ["termination"] }
libbpf-rs = "=0.26.1"
libc = "0.2"
log = "0.4"
scx_utils = { path = "../../../rust/scx_utils" }
simplelog = "0.12"

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.0" }
