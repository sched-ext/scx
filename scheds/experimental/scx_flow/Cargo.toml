[package]
name = "scx_flow"
version = "3.1.1"
authors = ["Galih Tama <galpt@v.recipes>"]
edition = "2021"
description = "A budget-driven sched_ext scheduler with zero heuristic classification. https://github.com/sched-ext/scx/tree/main"
license = "GPL-2.0-only"

[dependencies]
anyhow = "1"
ctrlc = { version = "3", features = ["termination"] }
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
clap_complete = "4"
crossbeam = "0.8"
libbpf-rs = "=0.26.2"
log = "0.4"
scx_stats = { path = "../../../rust/scx_stats", version = "1.1.2" }
scx_stats_derive = { path = "../../../rust/scx_stats/scx_stats_derive", version = "1.1.2" }
scx_utils = { path = "../../../rust/scx_utils", version = "1.1.2" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
simplelog = "0.12"
tiny_http = "0.12"

[build-dependencies]
scx_cargo = { path = "../../../rust/scx_cargo", version = "1.1.2" }

[features]
enable_backtrace = []
